name: CI
on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.0'
          - '1.1'
          - '1.2'
          - '1.3'
          - '1.4'
          - '1.5'
          - '1.6'
          - '1.7'
          - '1.8'
          - '1.9'
          - '1.10'
          - '1.11'
          - '1.12'
          - 'nightly'
        os:
          - ubuntu-latest
          - windows-latest
        arch:
          - x64
        include:
          # See https://discourse.julialang.org/t/how-to-fix-github-actions-ci-failures-with-julia-1-6-or-1-7-on-macos-latest-and-macos-14/117019
          - os: macos-13
            version: '1.0'
            arch: x64
          - os: macos-13
            version: '1.1'
            arch: x64
          - os: macos-13
            version: '1.2'
            arch: x64
          - os: macos-13
            version: '1.3'
            arch: x64
          - os: macos-13
            version: '1.4'
            arch: x64
          - os: macos-13
            version: '1.5'
            arch: x64
          - os: macos-13
            version: '1.6'
            arch: x64
          - os: macos-13
            version: '1.7'
            arch: x64
          - os: macos-latest
            version: '1.8'
            arch: aarch64
          - os: macos-latest
            version: '1.9'
            arch: aarch64
          - os: macos-latest
            version: '1.10'
            arch: aarch64
          - os: macos-latest
            version: '1.11'
            arch: aarch64
          - os: macos-latest
            version: '1.12'
            arch: aarch64
          - os: macos-latest
            version: 'nightly'
            arch: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: lcov.info
